{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="text-center mb-4" style="color: #c9a227;">Notifications</h2>
    </div>
    {% for notification in notifications %}
    <div class="col-md-6 mb-3">
        <div class="card {% if notification.is_read %}opacity-75{% endif %}">
            <div class="card-body">
                <p class="card-text">{{ notification.message }}</p>
                <small class="text-muted">{{ notification.created_at|date:"M d, Y H:i" }}</small>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="col-12 text-center">
        <p>No notifications yet.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
