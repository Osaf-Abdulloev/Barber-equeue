{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title text-center" style="color: #c9a227;">Add Service</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.name.id_for_label }}" class="form-label">Service Name</label>
                        {{ form.name }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.price.id_for_label }}" class="form-label">Price</label>
                        {{ form.price }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.duration.id_for_label }}" class="form-label">Duration (minutes)</label>
                        {{ form.duration }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.description.id_for_label }}" class="form-label">Description</label>
                        {{ form.description }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Add Service</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
