{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title text-center" style="color: #c9a227;">Book Appointment with {{ barber.user.username }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.service.id_for_label }}" class="form-label">Service</label>
                        {{ form.service }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.date.id_for_label }}" class="form-label">Date</label>
                        {{ form.date }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.time.id_for_label }}" class="form-label">Time</label>
                        {{ form.time }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Book Appointment</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
