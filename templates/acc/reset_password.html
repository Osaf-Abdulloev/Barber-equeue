{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title text-center" style="color: #c9a227;">Reset Password</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.code.id_for_label }}" class="form-label">Code from Email</label>
                        {{ form.code }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.new_password.id_for_label }}" class="form-label">New Password</label>
                        {{ form.new_password }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.confirm_password.id_for_label }}" class="form-label">Confirm Password</label>
                        {{ form.confirm_password }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
